<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
		<meta name="text-scale" content="scale" />
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
		
		<!-- Site Metadata -->
		<title>Siteglow — Premium Website Inspector</title>
		<meta name="description" content="Discover the DNA of any website. Inspect technology stacks, branding, assets, and performance in one sleek interface." />

		<!-- OpenGraph / Facebook -->
		<meta property="og:type" content="website" />
		<meta property="og:title" content="Siteglow — Premium Website Inspector" />
		<meta property="og:description" content="Discover the DNA of any website. Inspect technology stacks, branding, assets, and performance in one sleek interface." />
		<meta property="og:image" content="/favicon.svg" />

		<!-- Twitter -->
		<meta property="twitter:card" content="summary" />
		<meta property="twitter:title" content="Siteglow — Premium Website Inspector" />
		<meta property="twitter:description" content="Discover the DNA of any website. Inspect technology stacks, branding, assets, and performance in one sleek interface." />
		<meta property="twitter:image" content="/favicon.svg" />

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
