<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="icon" type="image/x-icon" href="/favicon.ico" />
		<meta name="text-scale" content="scale" />
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
		
		<!-- Site Metadata -->
		<title>WebDNA</title>
		<meta name="description" content="Analyze the genetic makeup of any website." />

		<!-- OpenGraph / Facebook -->
		<meta property="og:type" content="website" />
		<meta property="og:title" content="WebDNA" />
		<meta property="og:description" content="Analyze the genetic makeup of any website." />
		<meta property="og:image" content="https://webdna.xtra.wtf/og-image.png" />

		<!-- Twitter -->
		<meta property="twitter:card" content="summary_large_image" />
		<meta property="twitter:title" content="WebDNA" />
		<meta property="twitter:description" content="Analyze the genetic makeup of any website." />
		<meta property="twitter:image" content="https://webdna.xtra.wtf/og-image.png" />

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
